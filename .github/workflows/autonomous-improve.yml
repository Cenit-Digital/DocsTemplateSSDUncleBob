name: Auto-mejora de la documentación

# El "ciclo virtuoso": un agente de Claude revisa y mejora esta documentación
# de forma autónoma dos veces por semana (martes y viernes). Abre un Pull
# Request; sólo se auto-mergea si la CI (astro build) pasa en verde. El humano
# puede vetar cualquier PR. Ver docs de "Evolución autónoma" y .github/AUTONOMOUS.md.
#
# REQUISITO HUMANO (único paso manual): añadir el secret CLAUDE_CODE_OAUTH_TOKEN
# (genéralo con `claude setup-token` en tu terminal con suscripción Pro/Max) en
# Settings → Secrets and variables → Actions. Alternativa: ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: "0 6 * * 2" # martes 06:00 UTC
    - cron: "0 6 * * 5" # viernes 06:00 UTC
  workflow_dispatch:
    inputs:
      focus:
        description: "Tema opcional en el que enfocar la mejora"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # requerido por claude-code-action (OIDC)

concurrency:
  group: autonomous-improve
  cancel-in-progress: false

jobs:
  improve:
    name: Agente de auto-mejora
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar el agente de mejora (Claude Code)
        uses: anthropics/claude-code-action@v1
        env:
          # Para que `gh` (crear PR / auto-merge) esté autenticado dentro del agente.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Autenticación por SUSCRIPCIÓN Claude Pro/Max (token OAuth).
          # Alternativa: anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Eres el agente de auto-mejora de esta documentación viva (Astro Starlight, español)
            del arnés SDD "Uncle Bob". Enfoque opcional de esta ejecución (si no está vacío):
            "${{ github.event.inputs.focus }}".

            Sigue AL PIE DE LA LETRA el protocolo de .github/AUTONOMOUS.md. Resumen:
            1. Lee README.md, CLAUDE.md, .github/AUTONOMOUS.md y
               src/content/docs/evolucion/changelog.md (no repitas lo ya hecho).
            2. Aplica UNA mejora concreta y pequeña (claridad o contenido del método),
               apoyada en fuentes oficiales citadas. NO inventes. NO toques
               .github/workflows/ ni secretos. Si añades una página, enlázala en el
               sidebar de astro.config.mjs.
            3. Añade una entrada a src/content/docs/evolucion/changelog.md con la fecha
               real (obtenla con `date +%F`), resumen, motivo y fuentes.
            4. Verifica que `npm run build` pasa EN VERDE. Si falla, arréglalo (enlaces
               rotos, frontmatter YAML, MDX).
            5. Publica como Pull Request y activa el auto-merge, ejecutando en Bash:
                 git config user.name  "auto-mejora-bot"
                 git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                 BR="auto-mejora/$(date +%F)-$(date +%H%M%S)"
                 git checkout -b "$BR"
                 git add -A
                 git commit -m "docs: <resumen de la mejora>"
                 git push -u origin "$BR"
                 gh pr create --base main --head "$BR" --title "Auto-mejora: <resumen>" --body "<qué, por qué y fuentes>"
                 gh pr merge --auto --squash "$BR"
               Si no hay una mejora clara y fundamentada, haz una mejora mínima de
               claridad y regístrala igualmente (no fuerces cambios artificiales).
          claude_args: |
            --max-turns 40
            --model claude-sonnet-5
            --allowedTools Read,Edit,Write,Glob,Grep,Bash,WebSearch,WebFetch
